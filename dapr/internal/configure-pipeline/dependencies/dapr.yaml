apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: dapr-scheduler-server
    app.kubernetes.io/component: scheduler
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: dapr
    app.kubernetes.io/part-of: dapr
    app.kubernetes.io/version: 1.18.1
  name: dapr-scheduler-server
  namespace: dapr-system
spec:
  podManagementPolicy: Parallel
  replicas: 3
  selector:
    matchLabels:
      app: dapr-scheduler-server
  serviceName: dapr-scheduler-server
  template:
    metadata:
      annotations:
        dapr.io/control-plane: scheduler
        prometheus.io/path: /
        prometheus.io/port: "9090"
        prometheus.io/scrape: "true"
      labels:
        app: dapr-scheduler-server
        app.kubernetes.io/component: scheduler
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: dapr
        app.kubernetes.io/part-of: dapr
        app.kubernetes.io/version: 1.18.1
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                - linux
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - dapr-scheduler-server
              topologyKey: topology.kubernetes.io/zone
            weight: 100
      containers:
      - args:
        - --listen-address=0.0.0.0
        - --id
        - $(SCHEDULER_ID)
        - --etcd-initial-cluster
        - dapr-scheduler-server-0=https://dapr-scheduler-server-0.dapr-scheduler-server.dapr-system.svc.cluster.local:2380,dapr-scheduler-server-1=https://dapr-scheduler-server-1.dapr-scheduler-server.dapr-system.svc.cluster.local:2380,dapr-scheduler-server-2=https://dapr-scheduler-server-2.dapr-scheduler-server.dapr-system.svc.cluster.local:2380
        - --etcd-embed=true
        - --log-level
        - info
        - --enable-metrics
        - --metrics-port
        - "9090"
        - --etcd-client-port
        - "2379"
        - --etcd-data-dir=/var/run/data/dapr-scheduler/dapr-system/$(SCHEDULER_ID)
        - --etcd-space-quota=9.2E
        - --etcd-compaction-mode=revision
        - --etcd-compaction-retention=1000000
        - --etcd-snapshot-count=100000
        - --etcd-max-snapshots=10
        - --etcd-max-wals=10
        - --etcd-backend-batch-limit=10000
        - --etcd-backend-batch-interval=100ms
        - --etcd-max-txn-ops=10000
        - --etcd-experimental-bootstrap-defrag-threshold-megabytes=100
        - --etcd-initial-election-tick-advance=false
        - --etcd-metrics=basic
        - --tls-enabled
        - --trust-domain=cluster.local
        - --trust-anchors-file=/var/run/secrets/dapr.io/tls/ca.crt
        - --sentry-address=dapr-sentry.dapr-system.svc.cluster.local:443
        - --mode=kubernetes
        - --workers=2048
        command:
        - /scheduler
        env:
        - name: SCHEDULER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        image: ghcr.io/dapr/scheduler:1.18.1
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 5
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 180
          periodSeconds: 10
        name: dapr-scheduler-server
        ports:
        - containerPort: 50006
        - containerPort: 2379
          name: etcd-client
        - containerPort: 2380
          name: etcd-peer
        - containerPort: 9090
          name: metrics
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 1
          periodSeconds: 1
        resources: {}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
        volumeMounts:
        - mountPath: /var/run/data/dapr-scheduler/
          name: dapr-scheduler-data-dir
          readOnly: false
        - mountPath: /tmp
          name: dapr-scheduler-writeable-identity
        - mountPath: /var/run/secrets/dapr.io/tls
          name: dapr-trust-bundle
          readOnly: true
        - mountPath: /var/run/secrets/dapr.io/sentrytoken
          name: dapr-identity-token
      securityContext:
        fsGroup: 65532
      serviceAccountName: dapr-scheduler
      volumes:
      - emptyDir: {}
        name: dapr-scheduler-writeable-identity
      - configMap:
          name: dapr-trust-bundle
        name: dapr-trust-bundle
      - name: dapr-identity-token
        projected:
          sources:
          - serviceAccountToken:
              audience: spiffe://cluster.local/ns/dapr-system/dapr-sentry
              expirationSeconds: 600
              path: token
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: dapr-scheduler-data-dir
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 16Gi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  labels:
    app: dapr-scheduler-server
    app.kubernetes.io/component: scheduler
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: dapr
