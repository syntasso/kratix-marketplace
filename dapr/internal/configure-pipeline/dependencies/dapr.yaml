apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: dapr-sidecar-injector
    app.kubernetes.io/component: sidecar-injector
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: dapr
    app.kubernetes.io/part-of: dapr
    app.kubernetes.io/version: 1.18.1
  name: dapr-sidecar-injector
  namespace: dapr-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dapr-sidecar-injector
  template:
    metadata:
      annotations:
        dapr.io/control-plane: injector
        prometheus.io/path: /
        prometheus.io/port: "9090"
        prometheus.io/scrape: "true"
      labels:
        app: dapr-sidecar-injector
        app.kubernetes.io/component: sidecar-injector
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: dapr
        app.kubernetes.io/part-of: dapr
        app.kubernetes.io/version: 1.18.1
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                - linux
      containers:
      - args:
        - --log-level
        - info
        - --enable-metrics
        - --metrics-port
        - "9090"
        - --healthz-port
        - "8080"
        - --scheduler-enabled=true
        command:
        - /injector
        env:
        - name: DAPR_TRUST_ANCHORS_FILE
          value: /var/run/secrets/dapr.io/tls/ca.crt
        - name: DAPR_CONTROL_PLANE_TRUST_DOMAIN
          value: cluster.local
        - name: DAPR_SENTRY_ADDRESS
          value: dapr-sentry.dapr-system.svc.cluster.local:443
        - name: KUBE_CLUSTER_DOMAIN
          value: cluster.local
        - name: SIDECAR_IMAGE
          value: ghcr.io/dapr/daprd:1.18.1
        - name: SIDECAR_IMAGE_PULL_POLICY
          value: IfNotPresent
        - name: SIDECAR_RUN_AS_NON_ROOT
          value: "true"
        - name: ENABLE_K8S_DOWNWARD_APIS
          value: "false"
        - name: SIDECAR_DROP_ALL_CAPABILITIES
          value: "false"
        - name: SIDECAR_READ_ONLY_ROOT_FILESYSTEM
          value: "true"
        - name: NATIVE_SIDECAR_ENABLED
          value: "false"
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: IGNORE_ENTRYPOINT_TOLERATIONS
          value: '[{\"effect\":\"NoSchedule\",\"key\":\"alibabacloud.com/eci\"},{\"effect\":\"NoSchedule\",\"key\":\"azure.com/aci\"},{\"effect\":\"NoSchedule\",\"key\":\"aws\"},{\"effect\":\"NoSchedule\",\"key\":\"huawei.com/cci\"}]'
        - name: ACTORS_ENABLED
          value: "true"
        - name: ACTORS_SERVICE_NAME
          value: placement
        - name: ACTORS_SERVICE_ADDRESS
          value: dapr-placement-server:50005
        image: ghcr.io/dapr/injector:1.18.1
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 5
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 180
          periodSeconds: 10
        name: dapr-sidecar-injector
        ports:
        - containerPort: 4000
          name: https
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 1
          periodSeconds: 1
        resources: {}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
        volumeMounts:
        - mountPath: /var/run/secrets/dapr.io/tls
          name: dapr-trust-bundle
          readOnly: true
        - mountPath: /var/run/secrets/dapr.io/sentrytoken
          name: dapr-identity-token
          readOnly: true
      serviceAccountName: dapr-injector
      volumes:
      - configMap:
          name: dapr-trust-bundle
        name: dapr-trust-bundle
      - name: dapr-identity-token
        projected:
          sources:
          - serviceAccountToken:
              audience: spiffe://cluster.local/ns/dapr-system/dapr-sentry
              expirationSeconds: 600
              path: token
