apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: configurations.dapr.io
  labels:
    app.kubernetes.io/part-of: "dapr"
spec:
  group: dapr.io
  names:
    kind: Configuration
    listKind: ConfigurationList
    plural: configurations
    singular: configuration
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Configuration describes an Dapr configuration setting.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ConfigurationSpec is the spec for a configuration.
            properties:
              accessControl:
                description: AccessControlSpec is the spec object in ConfigurationSpec.
                properties:
                  defaultAction:
                    type: string
                  policies:
                    items:
                      description: AppPolicySpec defines the policy data structure
                        for each app.
                      properties:
                        appId:
                          type: string
                        defaultAction:
                          type: string
                        namespace:
                          type: string
                        operations:
                          items:
                            description: AppOperationAction defines the data structure
                              for each app operation.
                            properties:
                              action:
                                type: string
                              httpVerb:
                                items:
                                  type: string
                                type: array
                              name:
                                type: string
                            required:
                            - action
                            - name
                            type: object
                          type: array
                        trustDomain:
                          type: string
                      required:
                      - appId
                      type: object
                    type: array
                  trustDomain:
                    type: string
                type: object
              api:
                description: APISpec describes the configuration for Dapr APIs.
                properties:
                  allowed:
                    description: List of allowed APIs. Can be used in conjunction
                      with denied.
                    items:
                      description: APIAccessRule describes an access rule for allowing
                        or denying a Dapr API.
                      properties:
                        name:
                          type: string
                        protocol:
                          type: string
                        version:
                          type: string
                      required:
                      - name
                      - version
                      type: object
                    type: array
                  denied:
                    description: List of denied APIs. Can be used in conjunction with
                      allowed.
                    items:
                      description: APIAccessRule describes an access rule for allowing
                        or denying a Dapr API.
                      properties:
                        name:
                          type: string
                        protocol:
                          type: string
                        version:
                          type: string
                      required:
                      - name
                      - version
                      type: object
                    type: array
                type: object
              appHttpPipeline:
                description: PipelineSpec defines the middleware pipeline.
                properties:
                  handlers:
                    items:
                      description: HandlerSpec defines a request handlers.
                      properties:
                        name:
                          type: string
                        selector:
                          description: SelectorSpec selects target services to which
                            the handler is to be applied.
                          properties:
                            fields:
                              items:
                                description: SelectorField defines a selector fields.
                                properties:
                                  field:
                                    type: string
                                  value:
                                    type: string
                                required:
                                - field
                                - value
                                type: object
                              type: array
                          required:
                          - fields
                          type: object
                        type:
                          type: string
                      required:
                      - name
                      - type
                      type: object
                    type: array
                required:
                - handlers
                type: object
              components:
                description: ComponentsSpec describes the configuration for Dapr components
                properties:
                  deny:
                    description: Denylist of component types that cannot be instantiated
                    items:
                      type: string
                    type: array
                type: object
              features:
                items:
                  description: FeatureSpec defines the features that are enabled/disabled.
                  properties:
                    enabled:
                      type: boolean
                    name:
                      type: string
                  required:
                  - enabled
                  - name
                  type: object
                type: array
              httpPipeline:
                description: PipelineSpec defines the middleware pipeline.
                properties:
                  handlers:
                    items:
                      description: HandlerSpec defines a request handlers.
                      properties:
                        name:
                          type: string
                        selector:
                          description: SelectorSpec selects target services to which
                            the handler is to be applied.
                          properties:
                            fields:
                              items:
                                description: SelectorField defines a selector fields.
                                properties:
                                  field:
                                    type: string
                                  value:
                                    type: string
                                required:
                                - field
                                - value
                                type: object
                              type: array
                          required:
                          - fields
                          type: object
                        type:
                          type: string
                      required:
                      - name
                      - type
                      type: object
                    type: array
                required:
                - handlers
                type: object
              logging:
                description: LoggingSpec defines the configuration for logging.
                properties:
                  apiLogging:
                    description: Configure API logging.
                    properties:
                      enabled:
                        description: |-
                          Default value for enabling API logging. Sidecars can always override this by setting `--enable-api-logging` to true or false explicitly.
                          The default value is false.
                        type: boolean
                      obfuscateURLs:
                        description: |-
                          When enabled, obfuscates the values of URLs in HTTP API logs, logging the route name rather than the full path being invoked, which could contain PII.
                          Default: false.
                          This option has no effect if API logging is disabled.
                        type: boolean
                      omitHealthChecks:
                        description: |-
                          If true, health checks are not reported in API logs. Default: false.
                          This option has no effect if API logging is disabled.
                        type: boolean
                    type: object
                type: object
              metric:
                default:
                  enabled: true
                description: MetricSpec defines metrics configuration.
                properties:
                  enabled:
                    type: boolean
                  http:
                    description: MetricHTTP defines configuration for metrics for
                      the HTTP server
                    properties:
                      excludeVerbs:
                        description: If true (default is false) HTTP verbs (e.g.,
                          GET, POST) are excluded from the metrics.
                        type: boolean
                      increasedCardinality:
                        description: |-
                          If false, metrics for the HTTP server are collected with increased cardinality.
                          The default is true in Dapr 1.13, but will be changed to false in 1.15+
                        type: boolean
                      pathMatching:
                        items:
                          type: string
                        type: array
                    type: object
                  latencyDistributionBuckets:
                    description: |-
                      The LatencyDistributionBuckets variable specifies the latency distribution buckets (in milliseconds) used for
                      histograms in the application. If this variable is not set or left empty, the application will default to using the standard histogram buckets.
                      The default histogram latency buckets (in milliseconds) are as follows:
                         1, 2, 3, 4, 5, 6, 8, 10, 13, 16, 20, 25, 30, 40, 50, 65, 80, 100, 130, 160, 200, 250, 300, 400, 500, 650, 800, 1,000, 2,000, 5,000, 10,000, 20,000, 50,000, 100,000.
                    items:
                      type: integer
                    type: array
                  recordErrorCodes:
                    type: boolean
                  rules:
                    items:
                      description: MetricsRule defines configuration options for a
                        metric.
                      properties:
                        labels:
                          items:
                            description: MetricsLabel defines an object that allows
                              to set regex expressions for a label.
                            properties:
                              name:
                                type: string
                              regex:
                                additionalProperties:
                                  type: string
                                type: object
                            required:
                            - name
                            - regex
                            type: object
                          type: array
                        name:
                          type: string
                      required:
                      - labels
                      - name
                      type: object
                    type: array
                required:
                - enabled
                type: object
              metrics:
                default:
                  enabled: true
                description: MetricSpec defines metrics configuration.
                properties:
                  enabled:
                    type: boolean
                  http:
                    description: MetricHTTP defines configuration for metrics for
                      the HTTP server
                    properties:
                      excludeVerbs:
                        description: If true (default is false) HTTP verbs (e.g.,
                          GET, POST) are excluded from the metrics.
                        type: boolean
                      increasedCardinality:
                        description: |-
                          If false, metrics for the HTTP server are collected with increased cardinality.
                          The default is true in Dapr 1.13, but will be changed to false in 1.15+
                        type: boolean
                      pathMatching:
                        items:
                          type: string
                        type: array
                    type: object
                  latencyDistributionBuckets:
                    description: |-
                      The LatencyDistributionBuckets variable specifies the latency distribution buckets (in milliseconds) used for
                      histograms in the application. If this variable is not set or left empty, the application will default to using the standard histogram buckets.
                      The default histogram latency buckets (in milliseconds) are as follows:
                         1, 2, 3, 4, 5, 6, 8, 10, 13, 16, 20, 25, 30, 40, 50, 65, 80, 100, 130, 160, 200, 250, 300, 400, 500, 650, 800, 1,000, 2,000, 5,000, 10,000, 20,000, 50,000, 100,000.
                    items:
                      type: integer
                    type: array
                  recordErrorCodes:
                    type: boolean
                  rules:
                    items:
                      description: MetricsRule defines configuration options for a
                        metric.
                      properties:
                        labels:
                          items:
                            description: MetricsLabel defines an object that allows
                              to set regex expressions for a label.
                            properties:
                              name:
                                type: string
                              regex:
                                additionalProperties:
                                  type: string
                                type: object
                            required:
                            - name
                            - regex
                            type: object
                          type: array
                        name:
                          type: string
                      required:
                      - labels
                      - name
                      type: object
                    type: array
                required:
                - enabled
                type: object
              mtls:
                description: MTLSSpec defines mTLS configuration.
                properties:
                  allowedClockSkew:
                    type: string
                  controlPlaneTrustDomain:
                    type: string
                  enabled:
                    type: boolean
                  sentryAddress:
                    type: string
                  tokenValidators:
                    description: |-
                      Additional token validators to use.
                      When Dapr is running in Kubernetes mode, this is in addition to the built-in "kubernetes" validator.
                      In self-hosted mode, enabling a custom validator will disable the built-in "insecure" validator.
                    items:
                      description: ValidatorSpec contains additional token validators
                        to use.
                      properties:
                        name:
                          description: Name of the validator
                          enum:
                          - jwks
                          type: string
                        options:
                          description: Options for the validator, if any
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                      required:
                      - name
                      type: object
                    type: array
                  workloadCertTTL:
                    type: string
                required:
                - controlPlaneTrustDomain
                - enabled
                - sentryAddress
                type: object
              nameResolution:
                description: NameResolutionSpec is the spec for name resolution configuration.
                properties:
                  component:
                    type: string
                  configuration:
                    description: DynamicValue is a dynamic value struct for the component.metadata
                      pair value.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  version:
                    type: string
                required:
                - component
                - configuration
                - version
                type: object
              secrets:
                description: SecretsSpec is the spec for secrets configuration.
                properties:
                  scopes:
                    items:
                      description: SecretsScope defines the scope for secrets.
                      properties:
                        allowedSecrets:
                          items:
                            type: string
                          type: array
                        defaultAccess:
                          type: string
                        deniedSecrets:
                          items:
                            type: string
                          type: array
                        storeName:
                          type: string
                      required:
                      - storeName
                      type: object
                    type: array
                required:
                - scopes
                type: object
              tracing:
                description: TracingSpec defines distributed tracing configuration.
                properties:
                  otel:
                    description: OtelSpec defines Otel exporter configurations.
                    properties:
                      endpointAddress:
                        type: string
                      headers:
                        description: |-
                          Headers to add to the OTLP trace exporter request.
                          Each header can contain plaintext values, reference secrets, or reference environment variables.
                        items:
                          description: NameValuePair is a name/value pair.
                          properties:
                            envRef:
                              description: EnvRef is the name of an environmental
                                variable to read the value from.
                              type: string
                            name:
                              description: Name of the property.
                              type: string
                            secretKeyRef:
                              description: SecretKeyRef is the reference of a value
                                in a secret store component.
                              properties:
                                key:
                                  description: Field in the secret.
                                  type: string
                                name:
                                  description: Secret name.
                                  type: string
                              required:
                              - name
                              type: object
                            value:
                              description: Value of the property, in plaintext.
                              x-kubernetes-preserve-unknown-fields: true
                          required:
                          - name
                          type: object
                        type: array
                      isSecure:
                        type: boolean
                      protocol:
                        type: string
                      timeout:
                        description: Timeout for the OTLP trace exporter request.
                        type: string
                    required:
                    - endpointAddress
                    - isSecure
                    - protocol
                    type: object
                  samplingRate:
                    type: string
                  stdout:
                    type: boolean
                  zipkin:
                    description: ZipkinSpec defines Zipkin trace configurations.
                    properties:
                      endpointAddress:
                        type: string
                    required:
                    - endpointAddress
                    type: object
                required:
                - samplingRate
                type: object
              wasm:
                description: WasmSpec describes the security profile for all Dapr
                  Wasm components.
                properties:
                  strictSandbox:
                    description: |-
                      Force enabling strict sandbox mode for all WASM components.
                      When this is enabled, WASM components always run in strict mode regardless of their configuration.
                      Strict mode enhances security of the WASM sandbox by limiting access to certain capabilities such as real-time clocks and random number generators.
                    type: boolean
                type: object
              workflow:
                description: WorkflowSpec defines the configuration for Dapr workflows.
                properties:
                  maxConcurrentActivityInvocations:
                    description: |-
                      maxConcurrentActivityInvocations is the maximum number of concurrent activities that can be processed by a single Dapr instance.
                      Attempted invocations beyond this will be queued until the number of concurrent invocations drops below this value.
                      If omitted, no maximum will be enforced.
                    format: int32
                    type: integer
                  maxConcurrentWorkflowInvocations:
                    description: |-
                      maxConcurrentWorkflowInvocations is the maximum number of concurrent workflow invocations that can be scheduled by a single Dapr instance.
                      Attempted invocations beyond this will be queued until the number of concurrent invocations drops below this value.
                      If omitted, no maximum will be enforced.
                    format: int32
                    type: integer
                  stateRetentionPolicy:
                    description: |-
                      StateRetentionPolicy defines the retention configuration for workflow
                      state once a workflow reaches a terminal state. If not set, workflow
                      instances will not be automatically purged.
                    properties:
                      anyTerminal:
                        description: |-
                          AnyTerminal is the TTL for purging workflow instances that reach any
                          terminal state.
                        type: string
                      completed:
                        description: |-
                          Completed is the TTL for purging workflow instances that reach the
                          Completed terminal state.
                        type: string
                      failed:
                        description: |-
                          Failed is the TTL for purging workflow instances that reach the Failed
                          terminal state.
                        type: string
                      terminated:
                        description: |-
                          Terminated is the TTL for purging workflow instances that reach the
                          Terminated terminal state.
                        type: string
                    type: object
                type: object
            type: object
        type: object
    served: true
    storage: true

