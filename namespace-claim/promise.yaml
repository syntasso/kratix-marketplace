apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  name: namespace-claim
spec:
  requiredPromises:
    - name: namespace
      version: v1.0.0
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: namespaceclaims.marketplace.kratix.io
    spec:
      group: marketplace.kratix.io
      names:
        kind: NamespaceClaim
        listKind: NamespaceClaimList
        plural: namespaceclaims
        singular: namespaceclaim
      scope: Namespaced
      versions:
        - name: v1alpha1
          served: true
          storage: true
          schema:
            openAPIV3Schema:
              type: object
              properties:
                spec:
                  type: object
                  properties:
                    namespaceName:
                      description: Name of the shared namespace this claim wants.
                      type: string
                    clusterName:
                      description: Optional worker cluster (destination) selector.
                      type: string
                  required:
                    - namespaceName
  workflows:
    resource:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: claim-ensure
          spec:
            rbac:
              permissions:
                - resourceNamespace: "*"
                  apiGroups:
                    - marketplace.kratix.io
                  resources:
                    - namespaces
                  verbs:
                    - get
                    - create
                    - update
                    - patch
                - resourceNamespace: "*"
                  apiGroups:
                    - marketplace.kratix.io
                  resources:
                    - namespaceclaims
                  verbs:
                    - get
                    - list
            containers:
              - image: ghcr.io/syntasso/kratix-marketplace/namespace-claim-configure-pipeline:v0.1.0
                name: claim-ensure
                command: ["claim", "--ensure"]
                env:
                  - name: CLAIM_KIND
                    value: namespaceclaims.marketplace.kratix.io
                  - name: TARGET_FIELD
                    value: .spec.namespaceName
      delete:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: claim-release
          spec:
            rbac:
              permissions:
                - resourceNamespace: "*"
                  apiGroups:
                    - marketplace.kratix.io
                  resources:
                    - namespaces
                  verbs:
                    - get
                    - delete
                - resourceNamespace: "*"
                  apiGroups:
                    - marketplace.kratix.io
                  resources:
                    - namespaceclaims
                  verbs:
                    - get
                    - list
            containers:
              - image: ghcr.io/syntasso/kratix-marketplace/namespace-claim-configure-pipeline:v0.1.0
                name: claim-release
                command: ["claim", "--release"]
                env:
                  - name: CLAIM_KIND
                    value: namespaceclaims.marketplace.kratix.io
                  - name: TARGET_FIELD
                    value: .spec.namespaceName
