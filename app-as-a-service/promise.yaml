apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  creationTimestamp: null
  name: app
  labels:
    kratix.io/promise-version: v1.1.0-beta.1
spec:
  destinationSelectors:
    - matchLabels:
        environment: platform
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: apps.marketplace.kratix.io
    spec:
      group: marketplace.kratix.io
      names:
        kind: app
        plural: apps
        singular: app
      scope: Namespaced
      versions:
        - name: v1
          schema:
            openAPIV3Schema:
              properties:
                spec:
                  properties:
                    dbDriver:
                      default: none
                      description: database deployed with application
                      enum:
                        - postgresql
                        - none
                      type: string
                    image:
                      description: container image for application that will be deployed
                      example: gcr.io/syntasso/great-app
                      type: string
                    name:
                      type: string
                      description: Name for application. Lowercase letters, numbers, and hyphens; must start and end with a letter or number.
                      regex: ^(?![0-9]+$)(?!-)[a-zA-Z0-9-]{,63}(?<!-)$
                    service:
                      type: object
                      default: {}
                      properties:
                        port:
                          type: integer
                          description: port the application service will be exposed on
                          default: 8080
                  required:
                    - name
                    - image
                  type: object
              type: object
          served: true
          storage: true
  requiredPromises:
    - name: postgresql
      version: v1.0.0-beta.4
    - name: nginx-ingress
      version: v1.0.0-beta.2
  workflows:
    promise:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: promise-configure
          spec:
            containers:
              - name: promise-configure
                image: ghcr.io/syntasso/kratix-marketplace/app-as-a-service-configure-pipeline:v0.2.0
                args: ["promise-configure"]
    resource:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: db-request
          spec:
            containers:
              - name: create-db-request
                image: ghcr.io/syntasso/kratix-marketplace/app-as-a-service-configure-pipeline:v0.2.0
                args: ["database-configure"]
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: resource-configure
          spec:
            rbac:
              permissions:
                - apiGroups:
                    - marketplace.kratix.io
                  resources:
                    - postgresqls
                  verbs:
                    - get
            containers:
              - name: create-base-resources
                image: ghcr.io/syntasso/kratix-marketplace/app-as-a-service-configure-pipeline:v0.2.0
                args: ["resource-configure"]
              - name: wait-db-ready
                image: ghcr.io/syntasso/kratix-marketplace/app-as-a-service-configure-pipeline:v0.2.0
                args: ["wait-db-ready"]
                env:
                  - name: POSTGRES_READY_TIMEOUT_SECONDS
                    value: "900"
                  - name: POSTGRES_READY_POLL_INTERVAL_SECONDS
                    value: "5"
              - name: vault-configure
                image: ghcr.io/syntasso/kratix-marketplace/app-as-a-service-configure-pipeline:v0.2.0
                args: ["vault-configure"]
                env:
                  - name: VAULT_ADDR
                    valueFrom:
                      secretKeyRef:
                        name: postgresql-vault
                        key: address
      delete:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: resource-delete
          spec:
            rbac:
              permissions:
                - apiGroups:
                    - marketplace.kratix.io
                  resources:
                    - postgresqls
                  verbs:
                    - get
                    - delete
            containers:
              - name: vault-resource-cleanup
                image: ghcr.io/syntasso/kratix-marketplace/app-as-a-service-configure-pipeline:v0.2.0
                args: ["resource-delete"]
                env:
                  - name: VAULT_ADDR
                    valueFrom:
                      secretKeyRef:
                        name: postgresql-vault
                        key: address
                  - name: VAULT_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: postgresql-vault
                        key: token
status: {}
